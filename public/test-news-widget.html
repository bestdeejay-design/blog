<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест новостей - GitHub Pages Widget</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    
    h1 {
      color: white;
      font-size: 36px;
      text-align: center;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    
    .subtitle {
      color: rgba(255,255,255,0.9);
      text-align: center;
      margin-bottom: 40px;
      font-size: 16px;
    }
    
    #news-widget {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    #news-widget h2 {
      font-size: 28px;
      margin-bottom: 30px;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .news-item {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
      border-left: 4px solid #667eea;
    }
    
    .news-item:hover {
      transform: translateX(5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    
    .news-title {
      font-size: 22px;
      font-weight: bold;
      color: #1a1a1a;
      margin-bottom: 12px;
    }
    
    .news-excerpt {
      color: #555;
      line-height: 1.7;
      margin-bottom: 15px;
      font-size: 15px;
    }
    
    .news-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: center;
    }
    
    .news-channel {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    
    .news-date {
      color: #666;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .news-author {
      color: #666;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #888;
      font-size: 18px;
    }
    
    .error {
      background: #ffebee;
      color: #c62828;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      border: 2px solid #ef5350;
    }
    
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #888;
      font-size: 16px;
    }
    
    @media (max-width: 768px) {
      #news-widget {
        padding: 25px;
      }
      
      .news-item {
        padding: 20px;
      }
      
      .news-title {
        font-size: 18px;
      }
      
      .news-meta {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📰 Новости</h1>
    <p class="subtitle">Тест виджета для GitHub Pages</p>
    
    <div id="news-widget">
      <h2>🔥 Последние новости</h2>
      <div id="news-container">
        <div class="loading">⏳ Загрузка новостей...</div>
      </div>
    </div>
  </div>
  
  <script>
    // Для локального тестирования
    const API_URL = window.location.hostname === 'localhost' 
      ? 'http://localhost:3000/api/public/news'
      : '/api/public/news';
    
    async function loadNews() {
      const container = document.getElementById('news-container');
      
      try {
        console.log('Loading news from:', API_URL);
        const response = await fetch(API_URL + '?limit=10');
        const data = await response.json();
        
        console.log('Received data:', data);
        
        if (!data.success || !data.news || data.news.length === 0) {
          container.innerHTML = '<div class="empty">Новостей пока нет 📭</div>';
          return;
        }
        
        const newsHTML = data.news.map(news => {
          const date = new Date(news.published_at).toLocaleDateString('ru-RU', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
          });
          
          const channelName = news.channels?.name || 'Без канала';
          const authorName = news.user_profiles?.full_name || news.user_profiles?.username;
          const excerpt = news.excerpt || (news.content ? news.content.substring(0, 200) + '...' : '');
          
          return `
            <div class="news-item">
              <div class="news-title">${escapeHtml(news.title)}</div>
              <div class="news-excerpt">${escapeHtml(excerpt)}</div>
              <div class="news-meta">
                <span class="news-channel">📺 ${escapeHtml(channelName)}</span>
                <span class="news-date">📅 ${date}</span>
                ${authorName ? `<span class="news-author">✍️ ${escapeHtml(authorName)}</span>` : ''}
              </div>
            </div>
          `;
        }).join('');
        
        container.innerHTML = newsHTML;
        
      } catch (error) {
        console.error('Error loading news:', error);
        container.innerHTML = `
          <div class="error">
            <strong>❌ Ошибка загрузки новостей</strong><br>
            <small>${error.message}</small>
          </div>
        `;
      }
    }
    
    function escapeHtml(text) {
      if (!text) return '';
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
    
    document.addEventListener('DOMContentLoaded', loadNews);
  </script>
</body>
</html>
