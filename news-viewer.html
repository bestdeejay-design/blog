<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📰 Новости - Просмотр</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      line-height: 1.5;
      padding: 40px 20px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    
    h1 {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 40px;
      color: #1d1d1f;
    }
    
    /* News List */
    .news-list {
      display: grid;
      gap: 20px;
    }
    
    .news-item {
      background: white;
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .news-item:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }
    
    .news-title {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.015em;
      margin-bottom: 12px;
      color: #1d1d1f;
    }
    
    .news-content {
      font-size: 17px;
      line-height: 1.6;
      color: #86868b;
      margin-bottom: 16px;
    }
    
    .news-meta {
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 13px;
      color: #86868b;
    }
    
    .news-date {
      font-weight: 500;
    }
    
    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    
    .modal-overlay.active {
      display: flex;
    }
    
    .modal-content {
      background: white;
      border-radius: 24px;
      width: 90%;
      max-width: 1200px;
      height: 85vh;
      margin: auto;
      overflow: hidden;
      display: grid;
      grid-template-columns: 350px 1fr;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    .modal-sidebar {
      border-right: 1px solid #e5e7eb;
      overflow-y: auto;
      background: #f9fafb;
    }
    
    .modal-sidebar-header {
      padding: 24px;
      border-bottom: 1px solid #e5e7eb;
      background: white;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    
    .modal-sidebar-title {
      font-size: 20px;
      font-weight: 600;
      color: #1d1d1f;
      margin-bottom: 8px;
    }
    
    .modal-close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: #f5f5f7;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.2s;
    }
    
    .modal-close-btn:hover {
      background: #e5e5e5;
    }
    
    .modal-news-list {
      padding: 16px;
    }
    
    .modal-news-item {
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
      background: white;
      border: 1px solid #e5e7eb;
    }
    
    .modal-news-item:hover {
      background: #f5f5f7;
      border-color: #667eea;
    }
    
    .modal-news-item.active {
      background: #667eea;
      border-color: #667eea;
      color: white;
    }
    
    .modal-news-item-title {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 4px;
    }
    
    .modal-news-item-date {
      font-size: 12px;
      opacity: 0.6;
    }
    
    .modal-main {
      overflow-y: auto;
      padding: 40px;
      background: white;
    }
    
    .modal-article-title {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
      color: #1d1d1f;
      line-height: 1.2;
    }
    
    .modal-article-meta {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 14px;
      color: #86868b;
    }
    
    .modal-article-content {
      font-size: 18px;
      line-height: 1.7;
      color: #333;
    }
    
    .modal-article-content p {
      margin-bottom: 20px;
    }
    
    .modal-article-content img {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      margin: 24px 0;
    }
    
    .modal-article-content video,
    .modal-article-content iframe {
      max-width: 100%;
      border-radius: 12px;
      margin: 24px 0;
    }
    
    .empty, .error {
      text-align: center;
      padding: 60px 20px;
      font-size: 17px;
      color: #86868b;
    }
    
    .error {
      color: #ff3b30;
    }
    
    @media (max-width: 768px) {
      body {
        padding: 24px 16px;
      }
      
      h1 {
        font-size: 32px;
      }
      
      .modal-content {
        grid-template-columns: 1fr;
        height: 95vh;
      }
      
      .modal-sidebar {
        max-height: 200px;
      }
      
      .modal-main {
        padding: 24px;
      }
      
      .modal-article-title {
        font-size: 24px;
      }
      
      .modal-article-content {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📰 Последние новости</h1>
    <div id="news-container" class="news-list"></div>
  </div>
  
  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content">
      <div class="modal-sidebar">
        <div class="modal-sidebar-header">
          <div class="modal-sidebar-title">Все новости</div>
          <button class="modal-close-btn" onclick="closeModal()">×</button>
        </div>
        <div class="modal-news-list" id="modal-news-list"></div>
      </div>
      <div class="modal-main">
        <article id="modal-article"></article>
      </div>
    </div>
  </div>
  
  <script>
    const API_URL = 'https://blog-three-opal-85.vercel.app/api/news-simple';
    let allNews = [];
    
    async function loadNews() {
      const container = document.getElementById('news-container');
      
      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        
        if (!data.success || !data.news || data.news.length === 0) {
          container.innerHTML = '<div class="empty">Новостей пока нет 📭</div>';
          return;
        }
        
        allNews = data.news;
        renderNewsList(allNews);
      } catch (error) {
        container.innerHTML = `<div class="error">❌ Ошибка загрузки новостей</div>`;
      }
    }
    
    function renderNewsList(newsItems) {
      const container = document.getElementById('news-container');
      
      const newsHTML = newsItems.map((news, index) => {
        const date = new Date(news.published_at).toLocaleDateString('ru-RU', {
          year: 'numeric',
          month: 'long',
          day: 'numeric'
        });
        
        const excerpt = news.excerpt || (news.content ? news.content.substring(0, 200) + '...' : '');
        
        return `
          <div class="news-item" onclick="openModal(${index})">
            <div class="news-title">${escapeHtml(news.title)}</div>
            <div class="news-content">${escapeHtml(excerpt)}</div>
            <div class="news-meta">
              <span class="news-date">📅 ${date}</span>
            </div>
          </div>
        `;
      }).join('');
      
      container.innerHTML = newsHTML;
    }
    
    function openModal(newsIndex) {
      const news = allNews[newsIndex];
      const overlay = document.getElementById('modal-overlay');
      const modalList = document.getElementById('modal-news-list');
      const article = document.getElementById('modal-article');
      
      // Render sidebar list
      modalList.innerHTML = allNews.map((n, i) => {
        const date = new Date(n.published_at).toLocaleDateString('ru-RU', {
          day: 'numeric',
          month: 'short'
        });
        
        return `
          <div class="modal-news-item ${i === newsIndex ? 'active' : ''}" 
               onclick="switchNews(${i})">
            <div class="modal-news-item-title">${escapeHtml(n.title)}</div>
            <div class="modal-news-item-date">${date}</div>
          </div>
        `;
      }).join('');
      
      // Render article
      const date = new Date(news.published_at).toLocaleDateString('ru-RU', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
      
      article.innerHTML = `
        <h1 class="modal-article-title">${escapeHtml(news.title)}</h1>
        <div class="modal-article-meta">
          <span class="news-date">📅 ${date}</span>
        </div>
        <div class="modal-article-content">${formatContent(news.content)}</div>
      `;
      
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    
    function switchNews(index) {
      openModal(index);
    }
    
    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('active');
      document.body.style.overflow = '';
    }
    
    function formatContent(content) {
      if (!content) return '';
      
      // Basic formatting - paragraphs
      return content.split('\n\n').map(p => `<p>${p}</p>`).join('');
    }
    
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Close modal on overlay click
    document.getElementById('modal-overlay').addEventListener('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });
    
    // ESC to close
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeModal();
      }
    });
    
    loadNews();
  </script>
</body>
</html>
