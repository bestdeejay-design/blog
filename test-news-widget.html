<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📰 Новости - Тест</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    
    h1 {
      color: white;
      font-size: 36px;
      text-align: center;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    
    .subtitle {
      color: rgba(255,255,255,0.9);
      text-align: center;
      margin-bottom: 40px;
      font-size: 16px;
    }
    
    #news-widget {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    #news-widget h2 {
      font-size: 28px;
      margin-bottom: 30px;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .news-item {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
      border-left: 4px solid #667eea;
    }
    
    .news-item:hover {
      transform: translateX(5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    
    .news-title {
      font-size: 22px;
      font-weight: bold;
      color: #1a1a1a;
      margin-bottom: 12px;
    }
    
    .news-excerpt {
      color: #555;
      line-height: 1.7;
      margin-bottom: 15px;
      font-size: 15px;
    }
    
    .news-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: center;
    }
    
    .news-channel {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    
    .news-date {
      color: #666;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .news-author {
      color: #666;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #888;
      font-size: 18px;
    }
    
    .error {
      background: #ffebee;
      color: #c62828;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      border: 2px solid #ef5350;
    }
    
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #888;
      font-size: 16px;
    }
    
    @media (max-width: 768px) {
      #news-widget {
        padding: 25px;
      }
      
      .news-item {
        padding: 20px;
      }
      
      .news-title {
        font-size: 18px;
      }
      
      .news-meta {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📰 Новости</h1>
    <p class="subtitle">Тест виджета для GitHub Pages</p>
    
    <div id="news-widget">
      <h2>🔥 Последние новости</h2>
      <div id="news-container">
        <div class="loading">⏳ Загрузка новостей...</div>
      </div>
    </div>
  </div>
  
  <script>
    // ВАЖНО: Укажите полный URL к вашему API на Vercel
    const API_URL = 'https://blog-three-opal-85.vercel.app/api/news-simple';
    
    let currentOffset = 0;
    const limit = 12;
    let isLoading = false;
    let hasMore = true;
    let allNews = [];
    
    async function loadNews() {
      if (isLoading || !hasMore) return;
      
      isLoading = true;
      const container = document.getElementById('news-container');
      
      try {
        console.log('Loading news from:', `${API_URL}?limit=${limit}&offset=${currentOffset}`);
        const response = await fetch(`${API_URL}?limit=${limit}&offset=${currentOffset}`);
        const data = await response.json();
        
        console.log('Received data:', data);
        
        if (!data.success || !data.news || data.news.length === 0) {
          if (allNews.length === 0) {
            container.innerHTML = '<div class="empty">Новостей пока нет 📭</div>';
          }
          return;
        }
        
        allNews = [...allNews, ...(data.news || [])];
        hasMore = data.hasMore || false;
        currentOffset += limit;
        
        renderNewsList(allNews);
        
        // Добавляем индикатор загрузки если есть еще новости
        if (hasMore) {
          container.innerHTML += '<div id="loading-indicator" style="text-align:center;padding:20px;color:#86868b;">Загрузка...</div>';
        }
      } catch (error) {
        console.error('Error loading news:', error);
        if (allNews.length === 0) {
          container.innerHTML = `
            <div class="error">
              <strong>❌ Ошибка загрузки новостей</strong><br>
              <small>${error.message}</small>
            </div>
          `;
        }
      }
      
      isLoading = false;
    }
    
    function renderNewsList(newsList) {
      const container = document.getElementById('news-container');
      
      const newsHTML = newsList.map(news => {
        const date = new Date(news.published_at).toLocaleDateString('ru-RU', {
          year: 'numeric',
          month: 'long',
          day: 'numeric'
        });
        
        const channelName = news.channels?.name || 'Без канала';
        const excerpt = news.excerpt || (news.content ? news.content.substring(0, 200) + '...' : '');
        
        // Используем thumbnail из API
        const imageUrl = news.thumbnail || null;
        
        return `
          <div class="news-item">
            ${imageUrl ? `<img src="${escapeHtml(imageUrl)}" alt="News image" style="max-width: 100%; height: auto; border-radius: 12px; margin-bottom: 16px;" />` : ''}
            <div class="news-title">${escapeHtml(news.title)}</div>
            <div class="news-excerpt">${escapeHtml(excerpt)}</div>
            <div class="news-meta">
              <span class="news-channel">📺 ${escapeHtml(channelName)}</span>
              <span class="news-date">📅 ${date}</span>
            </div>
          </div>
        `;
      }).join('');
      
      container.innerHTML = newsHTML;
    }
    
    function escapeHtml(text) {
      if (!text) return '';
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
    
    // Ленивая загрузка при скролле
    window.addEventListener('scroll', () => {
      const scrollTop = window.scrollY;
      const windowHeight = window.innerHeight;
      const documentHeight = document.documentElement.scrollHeight;
      
      // Если доскроллили до конца (за 200px до конца)
      if (scrollTop + windowHeight >= documentHeight - 200) {
        loadNews();
      }
    });
    
    document.addEventListener('DOMContentLoaded', loadNews);
  </script>
</body>
</html>
